name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-verify-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build verify worker image
        uses: docker/build-push-action@v4
        with:
          context: ./ingestion/txodds
          file: ./ingestion/txodds/Dockerfile
          push: false
          tags: fixtureline-verify:ci
